<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Asset Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        @keyframes zoomIn { from { transform:scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }
        .login-box { animation: zoomIn 0.3s forwards; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center">
    <div class="login-box bg-white rounded-xl shadow-2xl max-w-sm w-full mx-4 p-8 text-center">
        <h3 class="text-3xl font-bold text-slate-900 mb-2">System Access</h3>
        <p class="text-slate-600 mb-6">Enter your credentials to continue.</p>

        {% if error %}
        <div class="text-red-500 text-sm mb-4 bg-red-50 border border-red-200 rounded-lg px-4 py-2">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <input type="text" name="username" placeholder="Username (e.g., admin, cse, civ)"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition" required>
            </div>
            <div class="relative">
                <input type="password" id="login-password" name="password" placeholder="Password"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition" required>
                <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 hover:text-slate-600">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="h-5 w-5" viewBox="0 0 16 16">
                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3 8 3c2.12 0 3.879.665 5.168 1.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 13 8 13c-2.12 0-3.879-.665-5.168-1.457A13.133 13.133 0 0 1 1.172 8z"/>
                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                    </svg>
                </button>
            </div>
            <button type="submit" class="w-full bg-teal-600 text-white font-semibold py-3 px-6 rounded-lg shadow-lg shadow-teal-500/30 hover:bg-teal-700 transition transform hover:scale-[1.03]">
                Secure Login
            </button>
        </form>
        <p class="mt-6 text-sm text-slate-500">
            <span class="font-bold">Admin:</span> admin/password<br>
            <span class="font-bold">Users:</span> cse/password, civ/password, etc.
        </p>
    </div>
    <script>
    document.getElementById('toggle-password').addEventListener('click', e => {
        e.preventDefault();
        const pw = document.getElementById('login-password');
        const icon = e.currentTarget.querySelector('svg');
        pw.type = pw.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('text-teal-600');
    });
    </script>
</body>
</html>
